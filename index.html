                    <label className="text-xs font-semibold block mb-1" style={{ color: colors.warmGray }}>체중 (kg) *</label>
                    <input type="number" step="0.1" placeholder="예: 55.5" value={editForm.value || ''} onChange={e => setEditForm({...editForm, value: e.target.value})}
                      className="w-full p-3 rounded-xl border" style={{ borderColor: colors.soft, background: colors.cream }} />
                  </div>
                  <div>
                    <label className="text-xs font-semibold block mb-1" style={{ color: colors.warmGray }}>메모 (선택)</label>
                    <input type="text" placeholder="예: 아침 공복" value={editForm.note || ''} onChange={e => setEditForm({...editForm, note: e.target.value})}
                      className="w-full p-3 rounded-xl border" style={{ borderColor: colors.soft, background: colors.cream }} />
                  </div>
                </>
              )}
              
              {/* 혈압 폼 */}
              {editModal === 'bp' && (
                <>
                  <div className="grid grid-cols-2 gap-2">
                    <div>
                      <label className="text-xs font-semibold block mb-1" style={{ color: colors.warmGray }}>수축기 *</label>
                      <input type="number" placeholder="예: 120" value={editForm.systolic || ''} onChange={e => setEditForm({...editForm, systolic: e.target.value})}
                        className="w-full p-3 rounded-xl border" style={{ borderColor: colors.soft, background: colors.cream }} />
                    </div>
                    <div>
                      <label className="text-xs font-semibold block mb-1" style={{ color: colors.warmGray }}>이완기 *</label>
                      <input type="number" placeholder="예: 80" value={editForm.diastolic || ''} onChange={e => setEditForm({...editForm, diastolic: e.target.value})}
                        className="w-full p-3 rounded-xl border" style={{ borderColor: colors.soft, background: colors.cream }} />
                    </div>
                  </div>
                  <div>
                    <label className="text-xs font-semibold block mb-1" style={{ color: colors.warmGray }}>메모 (선택)</label>
                    <input type="text" placeholder="예: 아침 측정" value={editForm.note || ''} onChange={e => setEditForm({...editForm, note: e.target.value})}
                      className="w-full p-3 rounded-xl border" style={{ borderColor: colors.soft, background: colors.cream }} />
                  </div>
                  <div className="p-3 rounded-xl text-xs" style={{ background: colors.cream, color: colors.warmGray }}>
                    <p><strong>정상</strong>: 120/80 이하</p>
                    <p><strong>주의</strong>: 130-139 / 80-89</p>
                    <p style={{ color: colors.danger }}><strong>고혈압 (병원)</strong>: 140/90 이상</p>
                  </div>
                </>
              )}
            </div>
            
            <div className="flex gap-2 mt-6">
              <button onClick={closeEdit} className="flex-1 py-3 rounded-xl font-semibold text-sm" style={{ background: colors.cream, color: colors.warmGray }}>
                취소
              </button>
              <button onClick={handleSave} className="flex-1 py-3 rounded-xl font-semibold text-sm" style={{ background: colors.primary, color: 'white' }}>
                저장
              </button>
            </div>
          </div>
        </div>
      )}

      {/* 응급 모달 */}
      {showEmergency && (
        <div className="fixed inset-0 z-50 flex items-end justify-center" style={{ background: 'rgba(0,0,0,0.5)' }} onClick={() => setShowEmergency(false)}>
          <div className="bg-white w-full max-w-2xl rounded-t-3xl p-6 max-h-[85vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
            <div className="flex justify-between items-center mb-4">
              <h2 className="font-bold text-xl" style={{ color: colors.danger }}>🚨 응급 가이드</h2>
              <button onClick={() => setShowEmergency(false)}>
                <X className="w-5 h-5" style={{ color: colors.warmGray }} />
              </button>
            </div>

            <div className="mb-4">
              <h3 className="font-bold text-sm mb-2" style={{ color: colors.danger }}>즉시 응급실 신호</h3>
              <div className="space-y-1.5">
                {emergencyGuide.immediate.map((item, i) => (
                  <div key={i} className="p-2 rounded text-xs" style={{ background: '#FFE5E5' }}>
                    <p className="font-semibold" style={{ color: colors.warmGray }}>⚠️ {item.sign}</p>
                    <p className="mt-0.5 opacity-70" style={{ color: colors.warmGray }}>{item.detail}</p>
                  </div>
                ))}
              </div>
            </div>

            <div className="mb-4">
              <h3 className="font-bold text-sm mb-2" style={{ color: colors.accent }}>📞 관찰/병원 연락</h3>
              <div className="space-y-1.5">
                {emergencyGuide.contact.map((item, i) => (
                  <div key={i} className="p-2 rounded text-xs flex justify-between" style={{ background: colors.cream }}>
                    <span style={{ color: colors.warmGray }}>{item.sign}</span>
                    <span className="font-semibold" style={{ color: colors.primaryDark }}>{item.action}</span>
                  </div>
                ))}
              </div>
            </div>

            <h3 className="font-bold text-sm mb-2" style={{ color: colors.warmGray }}>📞 비상 연락처</h3>
            <div className="space-y-2">
              {emergencyGuide.hotlines.map((h, i) => (
                <a key={i} href={`tel:${h.phone}`} className="block p-3 rounded-xl" style={{ background: i === 0 ? colors.danger : colors.cream, color: i === 0 ? 'white' : colors.warmGray }}>
                  <div className="flex justify-between items-center">
                    <div>
                      <p className="font-bold text-sm">{h.name}</p>
                      <p className="text-xs opacity-80 mt-0.5">{h.when}</p>
                    </div>
                    <span className="font-bold">{h.phone}</span>
                  </div>
                </a>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* 하단 탭 */}
      <nav className="fixed bottom-0 left-0 right-0 z-40 backdrop-blur-md" style={{ background: 'rgba(255, 248, 243, 0.95)', borderTop: '1px solid rgba(232, 155, 174, 0.2)' }}>
        <div className="max-w-2xl mx-auto px-2 py-2 flex justify-around">
          {tabs.map(tab => {
            const Icon = tab.icon;
            const isActive = activeTab === tab.id;
            return (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)} className="flex flex-col items-center py-1 px-2 rounded-xl transition" 
                      style={{ background: isActive ? colors.soft : 'transparent' }}>
                <Icon className="w-5 h-5 mb-0.5" style={{ color: isActive ? colors.primaryDark : colors.warmGray, opacity: isActive ? 1 : 0.5 }} />
                <span className="text-xs font-semibold" style={{ color: isActive ? colors.primaryDark : colors.warmGray, opacity: isActive ? 1 : 0.5 }}>{tab.label}</span>
              </button>
            );
          })}
        </div>
      </nav>
    </div>
  );
}

const root = createRoot(document.getElementById('root'));
root.render(<PregnancySuperApp />);
    </script>
</body>
</html>
